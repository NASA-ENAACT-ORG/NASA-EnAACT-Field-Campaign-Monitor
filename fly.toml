# fly.toml app configuration file generated for enact-walk-dashboard on 2026-03-19T13:27:51-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'enact-walk-dashboard'
primary_region = 'ewr'

[build]
  builder = 'paketobuildpacks/builder:base'

[env]
  PORT = '8080'

[[mounts]]
  source = 'walk_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
