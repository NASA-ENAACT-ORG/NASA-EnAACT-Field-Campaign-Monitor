name: Hourly Google Drive & Forecast Sync

on:
  schedule:
    # Run every hour at the top of the hour (0 minutes past)
    - cron: '0 * * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync Walks Log & Monitor Forecasts

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth google-auth-httplib2 google-auth-oauthlib google-api-python-client anthropic pdfplumber openpyxl pandas

      - name: Create service account JSON
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_SERVICE_ACCOUNT }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > drive-service-account.json

      - name: Run Google Drive Sync
        run: |
          cd "Claude Code Setup Data"
          timeout 120 python drive_sync.py || echo "⚠️ Drive sync completed or timed out"

      - name: Run Forecast Monitor
        run: |
          cd "Claude Code Setup Data"
          timeout 300 python forecast_monitor.py || echo "⚠️ Forecast monitor completed or timed out"

      - name: Commit updated Walks_Log.txt if changed
        run: |
          cd "Claude Code Setup Data"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if git diff --quiet Walks_Log.txt; then
            echo "✓ No changes to commit"
          else
            echo "📝 Committing updated Walks_Log.txt"
            git add Walks_Log.txt
            SYNC_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
            git commit -m "Auto-sync: Update Walks_Log.txt from Google Drive

- Synced at $SYNC_TIME
- Drive sync service processed new walk entries
[skip ci]"
            git push
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sync-logs
          path: "Claude Code Setup Data/*.log"
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Sync job failed - check logs in Actions tab"
          exit 1
