# Fly.io deployment disabled — project now deploys to GCP Cloud Run only.
# Kept for reference. Re-enable by restoring the push trigger below.
name: Fly Deploy (disabled)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fly" to confirm manual Fly.io deploy'
        required: true
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
