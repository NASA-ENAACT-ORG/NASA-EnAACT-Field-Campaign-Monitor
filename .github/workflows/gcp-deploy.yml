name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-east1
  SERVICE_NAME: enact-walk-dashboard
  IMAGE_NAME: enact-walk-dashboard

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker us-east1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          IMAGE_URL="us-east1-docker.pkg.dev/${PROJECT_ID}/${IMAGE_NAME}/${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="us-east1-docker.pkg.dev/${PROJECT_ID}/${IMAGE_NAME}/${IMAGE_NAME}:latest"

          # Build the Docker image
          docker build -t ${IMAGE_URL} -t ${IMAGE_LATEST} .

          # Push to Google Container Registry
          docker push ${IMAGE_URL}
          docker push ${IMAGE_LATEST}

          echo "IMAGE_URL=${IMAGE_URL}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          REGION=${{ env.REGION }}
          SERVICE_NAME=${{ env.SERVICE_NAME }}
          IMAGE_URL=${{ env.IMAGE_URL }}

          gcloud run deploy ${SERVICE_NAME} \
            --image=${IMAGE_URL} \
            --region=${REGION} \
            --platform=managed \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600 \
            --concurrency=100 \
            --max-instances=10 \
            --min-instances=0 \
            --service-account=cloud-run-sa@${PROJECT_ID}.iam.gserviceaccount.com \
            --set-env-vars="GPS_STALE_SECONDS=300,DRIVE_POLL_INTERVAL=0,GCS_BUCKET=enact-walk-dashboard-data-${PROJECT_ID}" \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_SERVICE_ACCOUNT_JSON=GOOGLE_SERVICE_ACCOUNT_JSON:latest,GOOGLE_DRIVE_FOLDER_ID=GOOGLE_DRIVE_FOLDER_ID:latest,GPS_AUTH_TOKEN=GPS_AUTH_TOKEN:latest,GAS_SECRET=GAS_SECRET:latest,DRIVE_FORECASTS_FOLDER_ID=DRIVE_FORECASTS_FOLDER_ID:latest" \
            --allow-unauthenticated

      - name: Get deployment URL
        run: |
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          REGION=${{ env.REGION }}
          SERVICE_NAME=${{ env.SERVICE_NAME }}

          URL=$(gcloud run services describe ${SERVICE_NAME} \
            --region=${REGION} \
            --format="value(status.url)")

          echo "✓ Deployment successful!"
          echo "Service URL: ${URL}"
          echo "Dashboard: ${URL}/dashboard.html"

      - name: Post deployment status
        if: always()
        run: |
          PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          STATUS=${{ job.status }}
          echo "Deployment Status: ${STATUS}"
